<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121310" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="七音造声所" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23dfff54'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='34'%3E%E2%99%AA%3C/text%3E%3C/svg%3E" />
    <meta
      name="description"
      content="用 Do Re Mi Fa Sol La Si 七个音符快速创作、试听并导出自己的旋律。"
    />
    <title>七音造声所</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <main class="shell">
      <header class="masthead">
        <a class="brand" href="#" aria-label="七音造声所首页">
          <span class="brand-mark" aria-hidden="true">♪</span>
          <span>七音造声所</span>
        </a>
        <div class="status" aria-live="polite">
          <span class="status-dot"></span>
          <span id="audioStatus">点击音符，唤醒声音</span>
        </div>
      </header>

      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow">SEVEN NOTES · ENDLESS SOUNDS</p>
          <h1 id="hero-title">七个音符，<br /><em>装下一个宇宙。</em></h1>
          <p class="intro">
            点一下琴键，或在节拍格里放入音符。无需乐理，几秒钟就能做出一段属于你的声音。
          </p>
        </div>
        <div class="orb-stage" aria-hidden="true">
          <div class="orbit orbit-one"></div>
          <div class="orbit orbit-two"></div>
          <div class="sound-orb" id="soundOrb">
            <canvas id="visualizer"></canvas>
            <span>LIVE</span>
          </div>
        </div>
      </section>

      <section class="studio" aria-label="声音控制台">
        <div class="panel-top">
          <div>
            <p class="section-kicker">01 · 选一种声音</p>
            <h2>先按下一个音符</h2>
          </div>
          <div class="control-row">
            <label class="select-wrap">
              <span>音色</span>
              <select id="waveform">
                <option value="piano" selected>拟真 · 钢琴</option>
                <option value="epiano">电声 · 电钢琴</option>
                <option value="sine">柔和 · 正弦</option>
                <option value="triangle">温暖 · 三角</option>
                <option value="square">像素 · 方波</option>
                <option value="sawtooth">明亮 · 锯齿</option>
              </select>
            </label>
            <label class="select-wrap compact">
              <span>八度</span>
              <select id="octave">
                <option value="3">低</option>
                <option value="4" selected>中</option>
                <option value="5">高</option>
              </select>
            </label>
          </div>
        </div>

        <div class="keys" id="keys" aria-label="七音符琴键">
          <button class="note-key note-do" data-note="C" data-index="0" aria-label="Do C">
            <span class="key-shortcut">A</span><strong>Do</strong><small>C</small>
          </button>
          <button class="note-key note-re" data-note="D" data-index="1" aria-label="Re D">
            <span class="key-shortcut">S</span><strong>Re</strong><small>D</small>
          </button>
          <button class="note-key note-mi" data-note="E" data-index="2" aria-label="Mi E">
            <span class="key-shortcut">D</span><strong>Mi</strong><small>E</small>
          </button>
          <button class="note-key note-fa" data-note="F" data-index="3" aria-label="Fa F">
            <span class="key-shortcut">F</span><strong>Fa</strong><small>F</small>
          </button>
          <button class="note-key note-sol" data-note="G" data-index="4" aria-label="Sol G">
            <span class="key-shortcut">G</span><strong>Sol</strong><small>G</small>
          </button>
          <button class="note-key note-la" data-note="A" data-index="5" aria-label="La A">
            <span class="key-shortcut">H</span><strong>La</strong><small>A</small>
          </button>
          <button class="note-key note-si" data-note="B" data-index="6" aria-label="Si B">
            <span class="key-shortcut">J</span><strong>Si</strong><small>B</small>
          </button>
        </div>
        <p class="keyboard-hint">也可以用键盘 <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> <kbd>F</kbd> <kbd>G</kbd> <kbd>H</kbd> <kbd>J</kbd> 演奏</p>
      </section>

      <section class="composer" aria-labelledby="composer-title">
        <div class="composer-head">
          <div>
            <p class="section-kicker">02 · 拼一段旋律</p>
            <h2 id="composer-title">点亮格子，让它循环</h2>
          </div>
          <div class="transport">
            <button class="icon-button primary" id="playButton" type="button">
              <span class="play-icon" aria-hidden="true"></span>
              <span id="playLabel">播放</span>
            </button>
            <label class="tempo-control" for="tempo">
              <span>速度 <output id="tempoValue">108</output> BPM</span>
              <input id="tempo" type="range" min="60" max="180" value="108" />
            </label>
          </div>
        </div>

        <div class="sequencer-wrap">
          <div class="sequencer" id="sequencer" role="grid" aria-label="16 步旋律编辑器"></div>
        </div>

        <div class="composer-actions">
          <div class="secondary-actions">
            <button class="text-button" id="demoButton" type="button">载入示例</button>
            <button class="text-button" id="randomButton" type="button">随机灵感</button>
            <button class="text-button danger" id="clearButton" type="button">全部清空</button>
          </div>
          <button class="export-button" id="exportButton" type="button">
            <span>导出 WAV</span>
            <span class="arrow" aria-hidden="true">↗</span>
          </button>
        </div>
      </section>

      <footer>
        <p>声音从来不复杂。先按下第一个音符。</p>
        <p class="footer-mark">MADE OF DO · RE · MI · FA · SOL · LA · SI</p>
      </footer>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
      }
    </script>
  </body>
</html>
